name: CDC Pact Contract Tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  contract-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout sample service
        uses: actions/checkout@v6

      - name: Checkout CDC framework
        uses: actions/checkout@v6
        with:
          repository: pravi976/consumer-driven-contract-testing
          path: consumer-driven-contract-testing

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run CDC Pact contract tests
        run: ./gradlew test

      - name: Upload generated Pact contracts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: generated-pacts
          path: build/pacts/**/*.json
          if-no-files-found: warn
