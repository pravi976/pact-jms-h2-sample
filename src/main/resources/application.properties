spring.application.name=pact-jms-h2-sample
spring.datasource.url=jdbc:h2:mem:jmssample;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

pact.framework.enabled=true
pact.framework.consumer-name=consumer-driven-contract-testing
pact.framework.provider-name=pact-jms-h2-sample
pact.framework.output-dir=build/pacts
pact.framework.verification-output-dir=build/generated/provider-verification
pact.framework.scan.base-packages[0]=com.enterprise.sample.jms
pact.framework.scan.rest-enabled=false
pact.framework.scan.jms-enabled=true
pact.framework.sample.mask-sensitive-fields=true
pact.framework.sample.max-collection-size=2
pact.framework.broker.enabled=false
